# Создать пост для теста пагинации (запустить несколько раз)
mutation {
  createPost(input: {
    authorID: "charlie"
    title: """Тестовый пост для пагинации"""
    body: """Этот пост создан для проверки пагинации в списке постов."""
    commentsEnabled: true
  }) {
    id
  }
}
