services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      STORAGE_TYPE: postgres
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/posts_comments?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: posts_comments
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d posts_comments"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
